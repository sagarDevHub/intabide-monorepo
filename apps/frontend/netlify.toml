[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.14.0"
  PNPM_VERSION = "10.5.2"
  NEXT_PUBLIC_API_URL = "https://intabide-nginx.onrender.com"
  PNPM_IGNORE_WORKSPACE_ROOT_CHECK = "true"

[[redirects]]
  from = "/api/*"
  to = "https://intabide-nginx.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200