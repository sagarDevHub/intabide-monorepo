events {
    worker_connections 1024;
}

http {
    # Point to your deployed AI service on Render
    upstream ai_service {
        server intabide-monorepo.onrender.com:80;
    }

    server {
        listen 80;

        # Route AI requests to Render AI Service
        location /api/ai/ {
            proxy_pass http://ai_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # For now, return a simple message for other routes
        location / {
            return 200 "Nginx Gateway is running! AI Service is available at /api/ai/\n";
            add_header Content-Type text/plain;
        }
    }
}