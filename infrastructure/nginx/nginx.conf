events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    upstream ai_service {
        server intabide-monorepo.onrender.com:443;
    }

    upstream auth_service {
        server intabide-auth-service.onrender.com:443;
    }

    upstream frontend_service {
        server intabide.netlify.app:443;
    }

    server {
        listen 80;

        # Frontend Application (Netlify)
        location / {
            proxy_pass https://frontend_service;
            proxy_set_header Host intabide.netlify.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name intabide.netlify.app;
        }

        # AI Service routes (Strips /api/ai/ before sending to Express)
        location /api/ai/ {
            proxy_pass https://ai_service/;
            proxy_set_header Host intabide-monorepo.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name intabide-monorepo.onrender.com;
        }

        # Auth Service routes (Strips /api/auth/ before sending to Express)
        location /api/auth/ {
            proxy_pass https://auth_service/;
            proxy_set_header Host intabide-auth-service.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name intabide-auth-service.onrender.com;
        }

        # Health check for Nginx Gateway
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}