events {
    worker_connections 1024;
}

http {
    # Point to your deployed AI service on Render
    upstream ai_service {
        server intabide-monorepo.onrender.com:80;
    }

    upstream auth_service {
        server intabide-auth-service:3002;
    }

    server {
        listen 80;

        # AI Route
        location /api/ai/ {
            proxy_pass http://ai_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
        }

        # Auth routes
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }        
    }
}